<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GameZone — Home</title>
  <script src="https://cdn.tailwindcss.com"></script>
<link rel="icon" type="image/x-icon" href="./favicon.ico?v=3">
  <link rel="stylesheet" href="style.css" />

  <link rel="preload" href="app.js" as="script">
  <style>body{opacity:0;animation:gz-fadein .18s ease forwards}@keyframes gz-fadein{to{opacity:1}}</style>
</head>
<body>

  <!-- ── HEADER ─────────────────────────────────── -->
  <header class="gz-header">
    <div class="gz-header__row">
      <div>
        <p style="font-size:12px;color:var(--text-3);font-weight:500;margin-bottom:2px;">Good evening 👋</p>
        <h1 class="gz-header__brand">Game<span>Zone</span></h1>
      </div>
      <div class="gz-header__actions">
        <button class="gz-icon-btn" data-action="bell" aria-label="Notifications">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span class="notif-dot"></span>
        </button>
      </div>
    </div>
  </header>

  <!-- ── MAIN ───────────────────────────────────── -->
  <main class="gz-page">

    <!-- ── Featured Carousel (fetches /api/featured) ──── -->
    <div id="gz-carousel" class="gz-carousel">
      <div class="gz-carousel__track"></div>
      <button class="gz-carousel__prev" aria-label="Previous">&#8249;</button>
      <button class="gz-carousel__next" aria-label="Next">&#8250;</button>
      <div class="gz-carousel__dots"></div>
    </div>

    <!-- Fallback: shown only when no featured games exist in the DB -->
    <div id="gz-carousel-fallback" style="display:none; margin-bottom:24px;">
      <div class="gz-featured">
        <div class="gz-featured__bg">
          <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?w=600&q=80" alt="featured" />
        </div>
        <div class="gz-featured__content">
          <span class="gz-featured__tag">⚡ Editor's Pick</span>
          <h2 class="gz-featured__title">Galaxia<br>Zero</h2>
          <button class="gz-featured__btn" onclick="openGamePlayer(GameStore.getById(8)?.game_url,'Galaxia Zero')">▶ Hozir o'yna</button>
        </div>
      </div>
    </div>

    <!-- Section header -->
    <div class="gz-section-hd">
      <h2>🔥 Trending</h2>
      <span id="gameCount"></span>
    </div>

    <!-- Grid -->
    <div class="gz-grid" id="gamesGrid"></div>

  </main>

  <!-- ── BOTTOM NAV ────────────────────────────── -->
  <nav class="gz-nav">
    <a class="gz-nav__item" href="index.html">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Home
    </a>
    <a class="gz-nav__item" href="library.html">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
      Library
    </a>
    <a class="gz-nav__item" href="favorites.html">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      Favourites
    </a>
    <a class="gz-nav__item" href="profile.html">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Profile
    </a>
  </nav>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
  <script>
  'use strict';

  function renderHome() {
    const grid  = document.getElementById('gamesGrid');
    const games = GameStore.getSorted();   // ← API dan, hardcode emas
    grid.innerHTML = '';
    const frag = document.createDocumentFragment();
    games.forEach(g => frag.appendChild(buildCard(g)));
    grid.appendChild(frag);
    document.getElementById('gameCount').textContent =
      `${games.length} game${games.length !== 1 ? 's' : ''}`;
  }

  // TASK 4: admin panel o'zgartirsa — darhol yangilash
  SyncBus.onUpdate(async () => {
    await fetchData();
    renderHome();
    Carousel.init();
    showToast('🔄 Games updated');
  });

  document.addEventListener('DOMContentLoaded', async () => {
    await fetchData();     // ← avval API'dan olib keladi
    renderHome();          // ← keyin render qiladi
    Carousel.init();
  });
  </script>
</body>
</html>
