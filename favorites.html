<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GameZone — Favourites</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@hotwired/turbo@8.0.10/dist/turbo.es2017-umd.js"></script>
  <style>
    .fav-count-badge {
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--accent-soft); color: var(--accent);
      font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700;
      padding: 2px 10px; border-radius: 999px; margin-left: 8px;
    }
  </style>
  <link rel="preload" href="app.js" as="script">
  <style>body{opacity:0;animation:gz-fadein .18s ease forwards}@keyframes gz-fadein{to{opacity:1}}</style>
</head>
<body>

  <!-- ── HEADER ─────────────────────────────────── -->
  <header class="gz-header">
    <div class="gz-header__row">
      <div>
        <p style="font-size:12px;color:var(--text-3);font-weight:500;margin-bottom:2px;">Your collection</p>
        <h1 class="gz-header__brand">Game<span>Zone</span></h1>
      </div>
      <div class="gz-header__actions">
        <button class="gz-icon-btn" data-action="bell" aria-label="Notifications">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- ── MAIN ───────────────────────────────────── -->
  <main class="gz-page">

    <div class="gz-section-hd">
      <h2 style="display:flex;align-items:center;">
        ❤️ Favourites
        <span class="fav-count-badge" id="favBadge">0</span>
      </h2>
    </div>

    <!-- Grid -->
    <div class="gz-grid" id="favGrid"></div>

    <!-- Empty state -->
    <div class="gz-empty" id="emptyState" style="display:none;">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
      <h3>No favourites yet</h3>
      <p>Tap the ❤️ on any game to save it here</p>
    </div>

  </main>

  <!-- ── BOTTOM NAV ────────────────────────────── -->
  <nav class="gz-nav">
    <a class="gz-nav__item" href="index.html">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Home
    </a>
    <a class="gz-nav__item" href="library.html">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
      Library
    </a>
    <a class="gz-nav__item" href="favorites.html">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      Favourites
    </a>
    <a class="gz-nav__item" href="profile.html">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Profile
    </a>
  </nav>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
  <script>
  'use strict';

  function renderFavorites() {
    const grid  = document.getElementById('favGrid');
    const empty = document.getElementById('emptyState');
    const badge = document.getElementById('favBadge');
    const games = GameStore.getLiked();   // ← GameStore dan, hardcode emas

    grid.querySelectorAll('.gz-card').forEach(c => c.remove());
    badge.textContent = games.length;

    if (!games.length) {
      empty.style.display = 'flex';
      return;
    }
    empty.style.display = 'none';
    games.forEach(g => grid.appendChild(buildCard(g)));
  }

  // TASK 4: admin panel o'yin o'chirsa, liked list yangilansin
  SyncBus.onUpdate(async () => {
    await fetchData();
    renderFavorites();
  });

  async function initFavoritesPage() {
    await fetchData();
    renderFavorites();
  }
  document.addEventListener('DOMContentLoaded', initFavoritesPage, { once: true });
  document.addEventListener('turbo:load', initFavoritesPage);
  </script>
</body>
</html>
